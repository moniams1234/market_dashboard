name: Daily market data update

on:
  workflow_dispatch:
  schedule:
    # GitHub używa UTC. Dwa uruchomienia + kontrola strefy w skrypcie
    # zapewniają 09:00 Europe/Warsaw zarówno latem, jak i zimą.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"

permissions:
  contents: write

concurrency:
  group: daily-market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update market data
        id: update
        run: node scripts/update-market-data.mjs
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- public/market_data.js; then
            echo "No market data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/market_data.js
          git commit -m "Update daily market data"
          git push

      - name: Send Gmail market summary
        if: steps.update.outputs.updated == 'true'
        run: python3 scripts/send-market-email.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MARKET_EMAIL_TO: ${{ secrets.MARKET_EMAIL_TO }}
