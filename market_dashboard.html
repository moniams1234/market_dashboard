<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Dashboard · 9 czerwca 2026</title>
<script src="market_data.js"></script>
<style>
:root{
  --bg:#f0ebe0;--panel:#fdfaf5;--panel2:#f6f0e5;--ink:#20160e;--muted:#806f55;
  --nav:#1a1410;--nav2:#241b14;--gold:#b8922e;--gold2:#d4aa4e;--line:rgba(32,22,14,.12);
  --up:#2a7a4f;--dn:#9a2a2a;--flat:#89785f;--shadow:0 18px 50px rgba(32,22,14,.10)
}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,system-ui,sans-serif;line-height:1.45;overflow:hidden}.app{height:100vh;min-height:0;display:grid;grid-template-columns:232px minmax(0,1fr)}.side{background:var(--nav);color:#f8f0df;display:flex;flex-direction:column;border-right:1px solid rgba(212,170,78,.2)}.brand{padding:26px 22px 22px;border-top:3px solid var(--gold);border-bottom:1px solid rgba(255,255,255,.08)}.mark{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--nav);font:700 18px Georgia,serif;margin-bottom:14px}.brand h1{font:700 24px Georgia,serif;margin:0 0 4px}.brand p{margin:0;color:rgba(248,240,223,.55);font-size:12px}.nav{padding:18px 12px;overflow:auto}.nav-group{margin-bottom:18px}.nav-label{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(212,170,78,.56);padding:0 10px 8px}.nav button{width:100%;border:0;background:transparent;color:rgba(248,240,223,.62);display:flex;align-items:center;gap:10px;padding:10px 12px;border-left:3px solid transparent;border-radius:0 7px 7px 0;font:500 13px Inter,Segoe UI,sans-serif;cursor:pointer;text-align:left}.nav button:hover{background:rgba(255,255,255,.05);color:#fff}.nav button.on{background:linear-gradient(90deg,rgba(184,146,46,.24),rgba(184,146,46,.05));border-left-color:var(--gold2);color:#fff}.dot{width:7px;height:7px;border-radius:50%;background:var(--gold2);box-shadow:0 0 0 6px rgba(212,170,78,.1)}.status{margin-top:auto;padding:16px 22px;color:rgba(248,240,223,.6);font-size:12px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}.main{min-width:0;min-height:0;display:flex;flex-direction:column;height:100%}.top{height:76px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;border-bottom:1px solid var(--line);background:rgba(253,250,245,.66);backdrop-filter:blur(10px)}.top h2{font:700 26px Georgia,serif;margin:0}.top p{margin:3px 0 0;color:var(--muted);font-size:12px}.actions{display:flex;gap:8px}.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:9px 12px;border-radius:7px;cursor:pointer;font-weight:600}.btn.primary{background:var(--nav);color:var(--gold2);border-color:var(--nav)}.content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:24px 30px 46px}.view{display:none}.view.on{display:block}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-bottom:16px}.hero-panel{background:var(--nav);color:#f8f0df;border-radius:8px;padding:24px;box-shadow:var(--shadow);min-height:178px}.hero-panel .kicker{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(212,170,78,.68)}.hero-panel h3{font:700 44px Georgia,serif;margin:8px 0 8px}.hero-panel p{color:rgba(248,240,223,.66);margin:0;max-width:760px}.today-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.today{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;display:grid;grid-template-columns:34px 1fr;gap:10px}.today i{font-style:normal;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--panel2);color:var(--gold);font-weight:800}.today h4{margin:0;font-size:14px}.today p{margin:4px 0 0;color:var(--muted);font-size:12px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 8px 22px rgba(32,22,14,.04)}.card.accent{border-top:3px solid var(--gold)}.card h3,.card h4{margin:0}.eyebrow{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}.value{font:700 30px Georgia,serif}.sub{color:var(--muted);font-size:12px}.chg{font-weight:700}.up{color:var(--up)}.dn{color:var(--dn)}.nt{color:var(--flat)}.section-title{display:flex;align-items:baseline;gap:12px;margin:24px 0 12px}.section-title h3{font:700 22px Georgia,serif;margin:0}.section-title:after{content:"";height:1px;background:var(--line);flex:1}.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px}.chart-head{display:flex;justify-content:space-between;gap:16px;margin-bottom:8px}.chart-head h4{margin:0;font:700 18px Georgia,serif}.chart{width:100%;height:260px}.legend{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:12px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--panel2);border-radius:999px;padding:5px 9px}.sw{width:9px;height:9px;border-radius:50%;background:var(--gold)}.row-list{display:flex;flex-direction:column;gap:10px}.mover{display:grid;grid-template-columns:70px 1fr auto;gap:12px;align-items:center}.ticker{font-weight:800}.bar{height:7px;border-radius:99px;background:rgba(32,22,14,.08);overflow:hidden;margin-top:7px}.fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px}.macro{display:grid;grid-template-columns:44px 1fr;gap:12px}.macro i{font-style:normal;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:var(--panel2);font-weight:900}.tag{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);font-weight:800}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:11px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:13px}.table th{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.note{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:14px;color:var(--muted)}.tooltip{position:fixed;display:none;max-width:260px;background:var(--nav);color:#fff;border:1px solid rgba(212,170,78,.45);border-radius:7px;padding:10px 12px;font-size:12px;z-index:20;box-shadow:var(--shadow)}.tooltip b{color:var(--gold2)}@media(max-width:1100px){.app{grid-template-columns:1fr}.side{display:none}.hero,.grid.two,.grid.three{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.top{height:auto;padding:18px;align-items:flex-start}.content{padding:18px}}@media(max-width:640px){body{overflow:auto}.app,.main{height:auto}.content{overflow:visible}.grid,.today-grid{grid-template-columns:1fr}.actions{display:none}.hero-panel h3{font-size:34px}}
@media print{body{overflow:visible}.app{display:block}.side,.actions{display:none}.content{overflow:visible}.view{display:block;break-inside:avoid}.top{position:static}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="mark">M</div><h1>Market Dashboard</h1><p id="side-date">Raport dzienny</p></div>
    <nav class="nav" id="nav"></nav>
    <div class="status"><span class="dot"></span><span>Raport rynkowy · 9 czerwca 2026</span></div>
  </aside>
  <main class="main">
    <header class="top">
      <div><h2 id="page-title">Przeglad rynku</h2><p id="page-subtitle"></p></div>
      <div class="actions"><button class="btn" id="print-btn">Drukuj/PDF</button><button class="btn primary" data-goto="export">Eksport</button></div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
'use strict';
(function(){
  const DATA = window.MARKET_DATA;
  const NAV = [
    { group:'Przeglad', items:[['today','Dzis'],['indices','Indeksy'],['sectors','Sektory'],['movers','Movers']] },
    { group:'Rynki', items:[['crypto','Krypto'],['forex','Forex'],['commodities','Surowce'],['yearly','Historia']] },
    { group:'Analiza', items:[['macro','Makro'],['rates','Stopy'],['bonds','Obligacje'],['narrative','Narracja'],['export','Eksport']] }
  ];
  const TITLES = {
    today:['Przeglad rynku','Najwazniejsze sygnaly dnia'], indices:['Indeksy','Globalne benchmarki akcyjne'],
    sectors:['Sektory','Sila relatywna segmentow rynku'], movers:['Top movers','Najmocniejsze ruchy USA i GPW'],
    crypto:['Krypto','Rynek cyfrowych aktywow'], forex:['Forex','Waluty istotne dla inwestora PLN'],
    commodities:['Surowce','Energia, metale i bezpieczne aktywa'], yearly:['Historia','Roczna sciezka indeksow i wydarzenia'],
    macro:['Makro','Narracja i czynniki ryzyka'], rates:['Stopy','Banki centralne'], bonds:['Obligacje','Rentownosci 10-letnie'],
    narrative:['Narracja','Syntetyczny komentarz rynkowy'], export:['Eksport','Widok do druku i przekazania dalej']
  };
  const fmtPct = v => (v>0?'+':'') + Number(v).toFixed(Math.abs(v)<1 && v!==0 ? 2 : 1) + '%';
  const cls = d => d === 'dn' || Number(d) < 0 ? 'dn' : d === 'nt' || Number(d) === 0 ? 'nt' : 'up';
  const esc = s => String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  function card(item){return `<article class="card accent"><div class="eyebrow">${esc(item.sub||item.ticker||'')}</div><h4>${esc(item.label||item.name||item.pair||item.country)}</h4><div class="value">${esc(item.value||item.yield||item.rate)}</div><div class="chg ${cls(item.dir||item.change)}">${item.change!==undefined?fmtPct(item.change):esc(item.change||item.stance||'')}</div><p class="sub">${esc(item.changePt||item.note||item.next||'')}</p></article>`}
  function section(title, html){return `<div class="section-title"><h3>${title}</h3></div>${html}`}
  function linePath(values,w,h,min,max){const span=max===min?1:max-min;return values.map((v,i)=>{const x=24+i*((w-48)/(values.length-1));const y=18+(max-v)*((h-44)/span);return `${i?'L':'M'}${x.toFixed(1)} ${y.toFixed(1)}`}).join(' ')}
  function svgLines(series, labels, events){
    const numericSeries = Object.fromEntries(Object.entries(series).filter(([,v]) => Array.isArray(v) && v.every(n => typeof n === 'number' && Number.isFinite(n))));
    const vals = Object.values(numericSeries).flat();
    const w=720,h=240;
    if(!vals.length) return `<svg class="chart" viewBox="0 0 ${w} ${h}" role="img"></svg>`;
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const span = max === min ? 1 : max - min;
    const colors = {sp500:'#2a7a4f',wig20:'#b8922e',nasdaq:'#4067b2',btc:'#9a5a1a'};
    let paths = Object.entries(numericSeries).map(([k,v])=>`<path d="${linePath(v,w,h,min,max)}" fill="none" stroke="${colors[k]||'#20160e'}" stroke-width="3" ${k==='wig20'?'stroke-dasharray="7 6"':''}/>`).join('');
    const baseY = 18+(max-100)*((h-44)/span);
    const safeLabels = Array.isArray(labels) ? labels : [];
    const ticks = safeLabels.map((l,i)=>{const x=24+i*((w-48)/(Math.max(1,safeLabels.length-1)));return `<text x="${x}" y="232" text-anchor="middle" font-size="11" fill="#806f55">${esc(l)}</text>`}).join('');
    const ev = (events||[]).map(e=>{const x=24+e.x*((w-48)/(Math.max(1,safeLabels.length-1)));return `<g class="event-dot" data-title="${esc(e.title)}" data-text="${esc(e.text)}" data-label="${esc(e.label)}"><circle cx="${x}" cy="${baseY-18}" r="6" fill="${e.type==='neg'?'#9a2a2a':e.type==='ind'?'#b8922e':'#2a7a4f'}"/><text x="${x}" y="${baseY-28}" text-anchor="middle" font-size="10" fill="#806f55">${esc(e.label)}</text></g>`}).join('');
    return `<svg class="chart" viewBox="0 0 ${w} ${h}" role="img"><line x1="24" x2="696" y1="${baseY}" y2="${baseY}" stroke="rgba(32,22,14,.18)" stroke-dasharray="4 5"/>${paths}${ev}${ticks}</svg>`
  }
  function renderNav(){document.getElementById('side-date').textContent = DATA.dateLabel; document.getElementById('nav').innerHTML = NAV.map(g=>`<div class="nav-group"><div class="nav-label">${g.group}</div>${g.items.map(([id,label])=>`<button data-goto="${id}">${label}</button>`).join('')}</div>`).join('')}
  function renderToday(){return `<section id="today" class="view"><div class="hero"><div class="hero-panel"><div class="kicker">${esc(DATA.dateLabel)}</div><h3>Selektywny risk-on</h3><p>${esc(DATA.generatedLabel)}.</p></div><div class="today-grid">${DATA.today.map(t=>`<article class="today"><i class="${cls(t.type==='neg'?'dn':'up')}">${t.icon}</i><div><h4>${esc(t.title)}</h4><p>${esc(t.sub)}</p></div></article>`).join('')}</div></div>${section('Glowne indeksy',`<div class="grid">${DATA.indices.slice(0,4).map(card).join('')}</div>`)}${section('Wykres dzienny',`<div class="chart-card"><div class="chart-head"><h4>S&P 500 vs WIG20</h4><div class="legend"><span class="pill"><span class="sw" style="background:#2a7a4f"></span>S&P 500</span><span class="pill"><span class="sw"></span>WIG20</span></div></div>${svgLines({sp500:DATA.dailyChart.sp500.map(v=>100+v),wig20:DATA.dailyChart.wig20.map(v=>100+v)},DATA.dailyChart.labels)}</div>`)}</section>`}
  function renderIndices(){return `<section id="indices" class="view">${section('Indeksy',`<div class="grid">${DATA.indices.map(card).join('')}</div>`)}${section('Co mierzy indeks',`<div class="grid two">${DATA.indexLegend.map(x=>`<article class="card"><div class="eyebrow">${esc(x.id)}</div><h4>${esc(x.name)}</h4><p class="sub">${esc(x.desc)}</p></article>`).join('')}</div>`)}</section>`}
  function renderSectors(){return `<section id="sectors" class="view">${section('Sektory',`<div class="grid three">${DATA.sectors.map(s=>`<article class="card"><h4>${esc(s.name)}</h4><div class="value ${cls(s.dir)}">${fmtPct(s.change)}</div><div class="bar"><div class="fill" style="width:${Math.min(100,Math.abs(s.change)*32+12)}%;background:${s.change<0?'#9a2a2a':'linear-gradient(90deg,var(--gold),var(--gold2))'}"></div></div></article>`).join('')}</div>`)}</section>`}
  function moversList(arr){return `<div class="row-list">${arr.map(m=>`<article class="card mover"><div><div class="ticker">${esc(m.ticker)}</div><div class="sub">${esc(m.exchange)}</div></div><div><h4>${esc(m.name)}</h4><p class="sub">${esc(m.reason)}</p><div class="bar"><div class="fill" style="width:${m.barPct}%;background:${m.change<0?'#9a2a2a':'#2a7a4f'}"></div></div></div><div class="chg ${cls(m.change)}">${fmtPct(m.change)}</div></article>`).join('')}</div>`}
  function renderMovers(){return `<section id="movers" class="view"><div class="grid two">${section('USA wzrosty',moversList(DATA.topMovers.usa.gainers))}${section('USA spadki',moversList(DATA.topMovers.usa.losers))}${section('GPW wzrosty',moversList(DATA.topMovers.gpw.gainers))}${section('GPW spadki',moversList(DATA.topMovers.gpw.losers))}</div></section>`}
  function simpleView(id,title,items){return `<section id="${id}" class="view">${section(title,`<div class="grid">${items.map(card).join('')}</div>`)}</section>`}
  function renderMacro(){return `<section id="macro" class="view">${section('Kontekst makro',`<div class="grid two">${DATA.macro.map(m=>`<article class="card macro"><i class="${cls(m.type==='neg'?'dn':'up')}">${m.icon}</i><div><div class="tag">${esc(m.tag)}</div><h4>${esc(m.title)}</h4><p class="sub">${esc(m.explain)}</p></div></article>`).join('')}</div>`)}</section>`}
  function renderYearly(){return `<section id="yearly" class="view">${section('Rok na rynku',`<div class="chart-card"><div class="chart-head"><h4>Indeksy rebazowane do 100</h4><div class="legend"><span class="pill"><span class="sw" style="background:#2a7a4f"></span>S&P 500</span><span class="pill"><span class="sw"></span>WIG20</span><span class="pill"><span class="sw" style="background:#4067b2"></span>Nasdaq</span><span class="pill"><span class="sw" style="background:#9a5a1a"></span>BTC</span></div></div>${svgLines(DATA.yearlyChart,DATA.yearlyChart.labels,DATA.yearlyEvents)}</div>`)}</section>`}
  function renderRates(){return `<section id="rates" class="view">${section('Banki centralne',`<table class="table"><thead><tr><th>Bank</th><th>Stopa</th><th>Nastawienie</th><th>Nastepny temat</th></tr></thead><tbody>${DATA.centralBanks.map(r=>`<tr><td><b>${esc(r.bank)}</b></td><td>${esc(r.rate)}</td><td>${esc(r.stance)}</td><td>${esc(r.next)}</td></tr>`).join('')}</tbody></table>`)}</section>`}
  function renderBonds(){return `<section id="bonds" class="view">${section('Rentownosci 10Y',`<div class="grid">${DATA.bonds10y.map(card).join('')}</div>`)}</section>`}
  function renderNarrative(){return `<section id="narrative" class="view">${section('Komentarz',`<div class="row-list">${DATA.narrative.map((n,i)=>`<article class="card"><div class="eyebrow">Teza ${i+1}</div><h4>${esc(n)}</h4></article>`).join('')}</div>`)}${section('Archiwum',`<div class="grid three">${DATA.archive.map(a=>`<article class="card"><div class="eyebrow">${esc(a.date)}</div><h4>${esc(a.title)}</h4></article>`).join('')}</div>`)}</section>`}
  function renderExport(){const preview=renderToday().replace('<section id="today" class="view">','<div class="export-preview">').replace('</section>','</div>');return `<section id="export" class="view"><div class="note"><b>Eksport:</b> uzyj przycisku Drukuj/PDF w prawym gornym rogu.</div>${preview}</section>`}
  function renderAll(){
    if(!DATA){document.getElementById('content').innerHTML='<div class="note">Blad: nie znaleziono market_data.js.</div>';return}
    renderNav();
    document.getElementById('content').innerHTML = [renderToday(),renderIndices(),renderSectors(),renderMovers(),simpleView('crypto','Krypto',DATA.crypto),simpleView('forex','Forex',DATA.forex),simpleView('commodities','Surowce',DATA.commodities),renderYearly(),renderMacro(),renderRates(),renderBonds(),renderNarrative(),renderExport()].join('');
    bind(); show('today');
  }
  function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.id===id));document.querySelectorAll('[data-goto]').forEach(b=>b.classList.toggle('on',b.dataset.goto===id));const t=TITLES[id]||TITLES.today;document.getElementById('page-title').textContent=t[0];document.getElementById('page-subtitle').textContent=t[1]+' · '+DATA.dateLabel;}
  function bind(){
    document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>show(b.dataset.goto)));
    document.getElementById('print-btn').addEventListener('click',()=>window.print());
    const tt=document.getElementById('tooltip');
    document.querySelectorAll('.event-dot').forEach(el=>{el.addEventListener('mouseenter',e=>{tt.innerHTML='<b>'+el.dataset.label+' · '+el.dataset.title+'</b><br>'+el.dataset.text;tt.style.display='block';});el.addEventListener('mousemove',e=>{tt.style.left=e.clientX+14+'px';tt.style.top=e.clientY+14+'px';});el.addEventListener('mouseleave',()=>{tt.style.display='none';});});
  }
  document.addEventListener('DOMContentLoaded',renderAll);
})();
</script>
</body>
</html>
